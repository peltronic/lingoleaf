services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      # Listen on all interfaces so the published port works.
      OLLAMA_HOST: "0.0.0.0:11434"
      # Allow browser extensions (Origin: chrome-extension://…) to call the API from pages/popups.
      OLLAMA_ORIGINS: "chrome-extension://*"
    volumes:
      - ollama_models:/root/.ollama
  model-setup:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    environment:
      # CLI in this container talks to the ollama service (not localhost).
      OLLAMA_HOST: "http://ollama:11434"
    # entrypoint sh -c must receive exactly one script argument; a bare string command is
    # tokenized by Compose, so sh only sees `until` → "expecting do".
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "until ollama list >/dev/null 2>&1; do sleep 2; done; ollama pull qwen2.5:3b"
    profiles:
      - setup

volumes:
  ollama_models:

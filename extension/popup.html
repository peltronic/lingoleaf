<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LingoLeaf — Saved</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        width: 360px;
        max-height: 480px;
        margin: 0;
        padding: 12px;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        font-size: 13px;
        color: #1a1a1a;
        background: #fafafa;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 15px;
        font-weight: 600;
      }
      .toolbar {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }
      .actions {
        display: flex;
        gap: 8px;
      }
      button {
        font: inherit;
        cursor: pointer;
        border: 1px solid #ccc;
        background: #fff;
        border-radius: 6px;
        padding: 4px 10px;
      }
      button:hover {
        background: #f0f0f0;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        overflow-y: auto;
        max-height: 400px;
      }
      li {
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 8px;
        background: #fff;
      }
      li:last-child {
        margin-bottom: 0;
      }
      .word {
        font-weight: 600;
        margin-bottom: 6px;
        word-break: break-word;
      }
      .translation {
        font-size: 13px;
        color: #404040;
        margin-bottom: 8px;
        word-break: break-word;
      }
      .translation.muted {
        color: #a3a3a3;
        font-style: italic;
      }
      .url {
        font-size: 12px;
        color: #2563eb;
        word-break: break-all;
      }
      .url a {
        color: inherit;
        text-decoration: none;
      }
      .url a:hover {
        text-decoration: underline;
      }
      .meta {
        font-size: 11px;
        color: #737373;
        margin-top: 6px;
      }
      .empty {
        color: #737373;
        padding: 16px 8px;
        text-align: center;
      }
      #status {
        margin: 0 0 8px;
        font-size: 12px;
        color: #525252;
      }
    </style>
  </head>
  <body>
    <h1>Saved to LingoLeaf</h1>
    <div class="toolbar">
      <p id="status"></p>
      <div class="actions">
        <button type="button" id="refresh" title="Fill missing translations">
          Fill missing
        </button>
        <button type="button" id="clear" title="Remove all saved items">Clear all</button>
      </div>
    </div>
    <ul id="list"></ul>
    <p id="empty" class="empty" hidden>No saved words yet. Select text, right-click, choose “Save to LingoLeaf”.</p>
    <script src="popup.js"></script>
  </body>
</html>

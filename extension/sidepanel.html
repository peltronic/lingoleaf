<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LingoLeaf</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body class="sidepanel-host">
    <div class="panel-body">
      <h1>Saved to LingoLeaf</h1>
      <p class="hint">This panel stays open while you browse. Use the toolbar icon to show or hide it.</p>
      <div class="toolbar">
        <p id="status"></p>
        <div class="actions">
          <button type="button" id="unlock-popup" class="text-icon-btn" title="Toolbar icon opens the small popup again">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <rect x="5" y="11" width="14" height="10" rx="2" />
              <path d="M7 11V7a5 5 0 0 1 9.9-1" />
            </svg>
            <span>Popup mode</span>
          </button>
          <button type="button" id="refresh" title="Fill missing translations">Fill missing</button>
          <button type="button" id="clear" title="Remove all saved items">Clear all</button>
        </div>
      </div>
      <ul id="list"></ul>
      <p id="empty" class="empty" hidden>No saved words yet. Select text, right-click, choose “Save to LingoLeaf”.</p>
    </div>
    <footer class="build-footer" aria-label="Build information">
      <span id="build-meta"></span>
    </footer>
    <script src="saved-list.js"></script>
  </body>
</html>
